<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ops Board — Dev / DevOps / Test</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #12161d; --panel: #1a2029; --panel-2: #212836; --border: #2a3341;
    --text: #e6e9ef; --text-dim: #8b95a5; --text-faint: #5a6474; --accent: #4fd1c5;
    --s-todo: #6b7280; --s-progress: #f0b429; --s-review: #4a90d9; --s-blocked: #e5484d; --s-done: #2dd6ac;
    --t-dev: #4a90d9; --t-devops: #8b7fd1; --t-test: #38bfa7;
    --p-high: #e5484d; --p-medium: #f0b429; --p-low: #5a6474;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh;
    background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.035) 1px, transparent 0); background-size: 22px 22px; }
  #root { padding: 20px; max-width: 1400px; margin: 0 auto; }
  .mono { font-family: 'JetBrains Mono', monospace; }

  .ob-header { display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 16px; margin-bottom: 16px; }
  .ob-title { font-size: 22px; font-weight: 800; letter-spacing: -0.01em; display: flex; align-items: center; gap: 10px; }
  .ob-title .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 0 4px rgba(79,209,197,0.15); }
  .ob-sub { color: var(--text-dim); font-size: 12.5px; margin-top: 4px; font-family: 'JetBrains Mono', monospace; }

  .nav-tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 18px; }
  .nav-tab { padding: 9px 16px; font-size: 13px; font-weight: 600; color: var(--text-dim); cursor: pointer;
    border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all .15s ease; user-select: none; }
  .nav-tab:hover { color: var(--text); }
  .nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .strip { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 20px; }
  .strip-cell { background: var(--panel); padding: 12px 14px; display: flex; flex-direction: column; gap: 4px; }
  .strip-top { display: flex; align-items: center; gap: 7px; }
  .strip-led { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .strip-led.pulse { animation: pulse-led 1.6s ease-in-out infinite; }
  @keyframes pulse-led { 0%, 100% { box-shadow: 0 0 0 0 rgba(229,72,77,0.55); } 50% { box-shadow: 0 0 0 5px rgba(229,72,77,0); } }
  .strip-count { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 700; }
  .strip-label { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-dim); }

  .toolbar { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
  .pills { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .pill { font-family: 'JetBrains Mono', monospace; font-size: 11.5px; padding: 6px 11px; border-radius: 999px; border: 1px solid var(--border); background: var(--panel); color: var(--text-dim); cursor: pointer; transition: all .15s ease; user-select: none; }
  .pill:hover { border-color: var(--accent); color: var(--text); }
  .pill.active { background: rgba(79,209,197,0.12); border-color: var(--accent); color: var(--accent); }
  select.sprint-select { font-family: 'JetBrains Mono', monospace; font-size: 11.5px; padding: 6px 11px; border-radius: 999px; border: 1px solid var(--border); background: var(--panel); color: var(--text); cursor: pointer; }

  .btn-add { font-family: 'Inter', sans-serif; font-weight: 600; font-size: 13px; background: var(--accent); color: #0c1512; border: none; padding: 9px 16px; border-radius: 8px; cursor: pointer; transition: filter .15s ease; }
  .btn-add:hover { filter: brightness(1.08); }

  .board { display: grid; grid-template-columns: repeat(5, minmax(230px, 1fr)); gap: 12px; overflow-x: auto; padding-bottom: 10px; }
  .col { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; min-height: 200px; display: flex; flex-direction: column; }
  .col-head { padding: 12px 12px 10px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; border-top: 3px solid var(--col-color, var(--accent)); border-radius: 12px 12px 0 0; }
  .col-head-title { font-size: 12.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text); }
  .col-head-count { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim); background: var(--panel-2); border-radius: 999px; padding: 1px 8px; }
  .col-body { padding: 10px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
  .empty-hint { color: var(--text-faint); font-size: 11.5px; font-family: 'JetBrains Mono', monospace; text-align: center; padding: 18px 6px; border: 1px dashed var(--border); border-radius: 8px; }

  .card { background: var(--panel-2); border: 1px solid var(--border); border-radius: 9px; padding: 10px 11px; display: flex; flex-direction: column; gap: 8px; }
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .card-title { font-size: 13px; font-weight: 600; line-height: 1.35; cursor: pointer; }
  .card-title:hover { color: var(--accent); }
  .card-desc { font-size: 11.5px; color: var(--text-dim); line-height: 1.4; max-height: 3.6em; overflow: hidden; }
  .card-meta { display: flex; align-items: center; flex-wrap: wrap; gap: 6px; }
  .team-pill { font-family: 'JetBrains Mono', monospace; font-size: 10px; padding: 2px 7px; border-radius: 5px; font-weight: 700; letter-spacing: 0.03em; }
  .sprint-pill { font-family: 'JetBrains Mono', monospace; font-size: 10px; padding: 2px 7px; border-radius: 5px; font-weight: 600; background: var(--panel); color: var(--text-dim); border: 1px solid var(--border); }
  .prio-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .card-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 2px; }
  .assignee { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: var(--text-dim); display: flex; align-items: center; gap: 5px; }
  .avatar { width: 18px; height: 18px; border-radius: 50%; background: var(--accent); color: #0c1512; font-size: 9px; font-weight: 800; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .due { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: var(--text-faint); }
  .card-actions { display: flex; gap: 4px; align-items: center; }
  .icon-btn { background: transparent; border: 1px solid var(--border); color: var(--text-dim); border-radius: 6px; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 12px; line-height: 1; transition: all .15s ease; }
  .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
  .icon-btn.danger:hover { border-color: var(--s-blocked); color: var(--s-blocked); }
  .icon-btn:disabled { opacity: 0.25; cursor: not-allowed; }
  .icon-btn:disabled:hover { border-color: var(--border); color: var(--text-dim); }

  .overlay { position: fixed; inset: 0; background: rgba(8,10,14,0.65); display: flex; align-items: center; justify-content: center; z-index: 50; padding: 16px; overflow-y: auto; }
  .modal { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; width: 100%; max-width: 460px; padding: 22px; max-height: 90vh; overflow-y: auto; }
  .modal h3 { font-size: 16px; margin: 0 0 16px; font-weight: 700; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-dim); margin-bottom: 5px; font-family: 'JetBrains Mono', monospace; }
  .field input, .field select, .field textarea { width: 100%; background: var(--panel-2); border: 1px solid var(--border); color: var(--text); border-radius: 7px; padding: 8px 10px; font-size: 13px; font-family: 'Inter', sans-serif; }
  .field textarea { resize: vertical; min-height: 55px; }
  .field-row { display: flex; gap: 10px; }
  .field-row .field { flex: 1; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; }
  .btn-secondary { background: transparent; border: 1px solid var(--border); color: var(--text-dim); padding: 8px 14px; border-radius: 8px; font-size: 13px; cursor: pointer; font-family: 'Inter', sans-serif; }
  .btn-secondary:hover { color: var(--text); border-color: var(--text-dim); }

  .loading-state, .config-error { color: var(--text-dim); font-family: 'JetBrains Mono', monospace; font-size: 12px; text-align: center; padding: 40px; }
  .config-error { color: var(--s-blocked); max-width: 520px; margin: 60px auto; line-height: 1.6; }

  .history-block { margin-top: 16px; border-top: 1px solid var(--border); padding-top: 14px; }
  .history-block h4 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-dim); margin: 0 0 10px; font-family: 'JetBrains Mono', monospace; }
  .history-item { display: flex; gap: 8px; font-size: 11.5px; padding: 5px 0; color: var(--text-dim); border-left: 2px solid var(--border); padding-left: 10px; margin-left: 3px; }
  .history-item .h-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); margin-left: -16px; margin-top: 4px; flex-shrink: 0; }
  .history-empty { font-size: 11.5px; color: var(--text-faint); font-family: 'JetBrains Mono', monospace; }

  .sprint-card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; margin-bottom: 14px; }
  .sprint-card-head { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-bottom: 8px; }
  .sprint-name { font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .sprint-status { font-family: 'JetBrains Mono', monospace; font-size: 10px; padding: 2px 9px; border-radius: 999px; text-transform: uppercase; letter-spacing: 0.04em; font-weight: 700; }
  .sprint-status.planned { background: rgba(139,149,165,0.15); color: var(--text-dim); }
  .sprint-status.active { background: rgba(79,209,197,0.15); color: var(--accent); }
  .sprint-status.completed { background: rgba(45,214,172,0.15); color: var(--s-done); }
  .sprint-dates { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-faint); }
  .sprint-goal { font-size: 12.5px; color: var(--text-dim); margin-bottom: 12px; }
  .progress-bar { height: 8px; background: var(--panel-2); border-radius: 999px; overflow: hidden; margin-bottom: 8px; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 999px; transition: width .3s ease; }
  .sprint-stats { display: flex; gap: 16px; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim); flex-wrap: wrap; }
  .sprint-actions { display: flex; gap: 6px; }

  .report-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 22px; }
  .report-stat { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
  .report-stat .val { font-family: 'JetBrains Mono', monospace; font-size: 26px; font-weight: 700; }
  .report-stat .lbl { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 4px; }
  .chart-panel { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 18px; margin-bottom: 16px; }
  .chart-panel h4 { font-size: 12.5px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-dim); margin: 0 0 16px; font-family: 'JetBrains Mono', monospace; }
  .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .bar-label { width: 90px; font-size: 11.5px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; flex-shrink: 0; }
  .bar-track { flex: 1; height: 16px; background: var(--panel-2); border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width .3s ease; }
  .bar-val { width: 30px; text-align: right; font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: var(--text-faint); flex-shrink: 0; }
  .activity-feed { display: flex; flex-direction: column; gap: 0; }
  .activity-item { display: flex; gap: 10px; font-size: 12px; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .activity-item:last-child { border-bottom: none; }
  .activity-time { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: var(--text-faint); white-space: nowrap; }

  .report-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  @media (max-width: 900px) {
    .board { grid-template-columns: repeat(5, 260px); }
    .strip { grid-template-columns: repeat(2, 1fr); }
    .report-grid { grid-template-columns: repeat(2, 1fr); }
    .report-grid-2 { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div id="root"><div class="loading-state">Chargement…</div></div>

<script>
// ============================================================
// CONFIGURATION
// ============================================================
const SUPABASE_URL = "https://VOTRE-PROJET.supabase.co";
const SUPABASE_ANON_KEY = "VOTRE_CLE_ANON_PUBLIC";
// ============================================================

(function() {
  const STATUSES = [
    { key: 'todo', label: 'À faire', color: 'var(--s-todo)' },
    { key: 'inprogress', label: 'En cours', color: 'var(--s-progress)' },
    { key: 'review', label: 'En revue', color: 'var(--s-review)' },
    { key: 'blocked', label: 'Bloqué', color: 'var(--s-blocked)' },
    { key: 'done', label: 'Terminé', color: 'var(--s-done)' }
  ];
  const TEAMS = {
    dev: { label: 'DEV', color: 'var(--t-dev)' },
    devops: { label: 'DEVOPS', color: 'var(--t-devops)' },
    test: { label: 'TEST', color: 'var(--t-test)' }
  };
  const PRIORITIES = {
    high: { label: 'Haute', color: 'var(--p-high)' },
    medium: { label: 'Moyenne', color: 'var(--p-medium)' },
    low: { label: 'Basse', color: 'var(--p-low)' }
  };

  const root = document.getElementById('root');

  if (!SUPABASE_URL.includes('supabase.co') || SUPABASE_ANON_KEY === "VOTRE_CLE_ANON_PUBLIC") {
    root.innerHTML = `<div class="config-error">⚠ Configuration manquante.<br><br>Renseigne SUPABASE_URL et SUPABASE_ANON_KEY en haut du &lt;script&gt;, puis recharge la page.</div>`;
    return;
  }

  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let tasks = [];
  let sprints = [];
  let activeTab = 'board';
  let activeTeamFilter = 'all';
  let activeSprintFilter = 'all';
  let modalState = null;
  let sprintModalState = null;
  let saveError = false;
  let connError = false;

  function initials(name) { if (!name) return '?'; const p = name.trim().split(/\s+/); return (p[0][0] + (p[1] ? p[1][0] : '')).toUpperCase(); }
  function escapeHtml(str) { const d = document.createElement('div'); d.textContent = str || ''; return d.innerHTML; }
  function fmtDate(d) { if (!d) return ''; const dt = new Date(d); return dt.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit', year: 'numeric' }); }
  function fmtDateTime(d) { if (!d) return ''; const dt = new Date(d); return dt.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit' }) + ' ' + dt.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' }); }
  function statusLabel(key) { const s = STATUSES.find(x => x.key === key); return s ? s.label : key; }

  async function loadAll() {
    const [tRes, sRes] = await Promise.all([
      supabase.from('tasks').select('*').order('created_at', { ascending: true }),
      supabase.from('sprints').select('*').order('created_at', { ascending: true })
    ]);
    if (tRes.error || sRes.error) { connError = true; console.error(tRes.error || sRes.error); }
    else { tasks = tRes.data.map(mapRow); sprints = sRes.data; connError = false; saveError = false; }
    render();
  }

  async function loadHistoryForTask(taskId) {
    const { data, error } = await supabase.from('task_history').select('*').eq('task_id', taskId).order('changed_at', { ascending: false }).limit(30);
    return error ? [] : data;
  }

  async function loadRecentActivity() {
    const { data, error } = await supabase.from('task_history').select('*').order('changed_at', { ascending: false }).limit(15);
    return error ? [] : data;
  }

  function mapRow(row) {
    return { id: row.id, title: row.title, desc: row.description || '', team: row.team, priority: row.priority,
      assignee: row.assignee || '', due: row.due || '', status: row.status, sprint_id: row.sprint_id, created_at: row.created_at };
  }

  async function addTask(data) {
    const { error } = await supabase.from('tasks').insert({
      title: data.title, description: data.desc, team: data.team, priority: data.priority,
      assignee: data.assignee, due: data.due || null, status: 'todo', sprint_id: data.sprint_id || null
    });
    saveError = !!error; if (error) console.error(error);
    await loadAll();
  }

  async function updateTask(id, patch) {
    const dbPatch = {};
    if ('title' in patch) dbPatch.title = patch.title;
    if ('desc' in patch) dbPatch.description = patch.desc;
    if ('team' in patch) dbPatch.team = patch.team;
    if ('priority' in patch) dbPatch.priority = patch.priority;
    if ('assignee' in patch) dbPatch.assignee = patch.assignee;
    if ('due' in patch) dbPatch.due = patch.due || null;
    if ('status' in patch) dbPatch.status = patch.status;
    if ('sprint_id' in patch) dbPatch.sprint_id = patch.sprint_id || null;
    const { error } = await supabase.from('tasks').update(dbPatch).eq('id', id);
    saveError = !!error; if (error) console.error(error);
    await loadAll();
  }

  async function deleteTask(id) {
    const { error } = await supabase.from('tasks').delete().eq('id', id);
    saveError = !!error;
    await loadAll();
  }

  function moveTask(id, dir) {
    const t = tasks.find(x => x.id === id); if (!t) return;
    const idx = STATUSES.findIndex(s => s.key === t.status);
    const newIdx = idx + dir;
    if (newIdx < 0 || newIdx >= STATUSES.length) return;
    updateTask(id, { status: STATUSES[newIdx].key });
  }

  async function saveSprint(data, id) {
    if (id) { const { error } = await supabase.from('sprints').update(data).eq('id', id); saveError = !!error; }
    else { const { error } = await supabase.from('sprints').insert(data); saveError = !!error; }
    await loadAll();
  }

  async function deleteSprint(id) {
    const { error } = await supabase.from('sprints').delete().eq('id', id);
    saveError = !!error;
    await loadAll();
  }

  function getFilteredTasks() {
    let f = tasks;
    if (activeTeamFilter !== 'all') f = f.filter(t => t.team === activeTeamFilter);
    if (activeSprintFilter === 'backlog') f = f.filter(t => !t.sprint_id);
    else if (activeSprintFilter !== 'all') f = f.filter(t => t.sprint_id === activeSprintFilter);
    return f;
  }

  function renderNavTabs() {
    const tabs = [ ['board', 'Board'], ['sprints', 'Sprints'], ['reports', 'Rapports'] ];
    return `<div class="nav-tabs">${tabs.map(([key, label]) => `<div class="nav-tab ${activeTab === key ? 'active' : ''}" data-tab="${key}">${label}</div>`).join('')}</div>`;
  }

  function renderStrip(taskList) {
    return `<div class="strip">${STATUSES.map(s => {
      const count = taskList.filter(t => t.status === s.key).length;
      const pulse = s.key === 'blocked' && count > 0;
      return `<div class="strip-cell"><div class="strip-top"><span class="strip-led ${pulse ? 'pulse' : ''}" style="background:${s.color}"></span><span class="strip-count">${count}</span></div><span class="strip-label">${s.label}</span></div>`;
    }).join('')}</div>`;
  }

  function renderToolbar() {
    const sprintOptions = sprints.map(s => `<option value="${s.id}" ${activeSprintFilter === s.id ? 'selected' : ''}>${escapeHtml(s.name)}</option>`).join('');
    return `<div class="toolbar">
      <div class="pills">
        <div class="pill ${activeTeamFilter === 'all' ? 'active' : ''}" data-filter="all">TOUT</div>
        ${Object.entries(TEAMS).map(([key, t]) => `<div class="pill ${activeTeamFilter === key ? 'active' : ''}" data-filter="${key}">${t.label}</div>`).join('')}
        <select class="sprint-select" id="sprint-filter">
          <option value="all" ${activeSprintFilter === 'all' ? 'selected' : ''}>Tous les sprints</option>
          <option value="backlog" ${activeSprintFilter === 'backlog' ? 'selected' : ''}>Backlog (sans sprint)</option>
          ${sprintOptions}
        </select>
      </div>
      <button class="btn-add" id="btn-open-add">+ Nouvelle tâche</button>
    </div>`;
  }

  function renderCard(t) {
    const team = TEAMS[t.team]; const prio = PRIORITIES[t.priority];
    const idx = STATUSES.findIndex(s => s.key === t.status);
    const sprint = sprints.find(s => s.id === t.sprint_id);
    return `<div class="card" data-id="${t.id}">
      <div class="card-top">
        <div class="card-title" data-open-detail="${t.id}">${escapeHtml(t.title)}</div>
        <div class="card-actions"><button class="icon-btn edit-btn" title="Modifier">✎</button><button class="icon-btn danger del-btn" title="Supprimer">✕</button></div>
      </div>
      ${t.desc ? `<div class="card-desc">${escapeHtml(t.desc)}</div>` : ''}
      <div class="card-meta">
        <span class="team-pill" style="background:${team.color}22; color:${team.color}">${team.label}</span>
        <span style="display:flex;align-items:center;gap:4px;font-size:10.5px;color:var(--text-dim)"><span class="prio-dot" style="background:${prio.color}"></span>${prio.label}</span>
        ${sprint ? `<span class="sprint-pill">${escapeHtml(sprint.name)}</span>` : ''}
      </div>
      <div class="card-foot">
        <span class="assignee">${t.assignee ? `<span class="avatar">${initials(t.assignee)}</span>${escapeHtml(t.assignee)}` : '<span class="mono">—</span>'}</span>
        <span class="due">${t.due ? fmtDate(t.due) : ''}</span>
      </div>
      <div class="card-actions" style="justify-content:flex-end;border-top:1px solid var(--border);padding-top:7px;margin-top:2px;">
        <button class="icon-btn move-left" ${idx === 0 ? 'disabled' : ''} title="Reculer">←</button>
        <button class="icon-btn move-right" ${idx === STATUSES.length - 1 ? 'disabled' : ''} title="Avancer">→</button>
      </div>
    </div>`;
  }

  function renderBoardTab() {
    const filtered = getFilteredTasks();
    return `${renderStrip(filtered)}${renderToolbar()}<div class="board">
      ${STATUSES.map(s => {
        const colTasks = filtered.filter(t => t.status === s.key);
        return `<div class="col"><div class="col-head" style="--col-color:${s.color}"><span class="col-head-title">${s.label}</span><span class="col-head-count">${colTasks.length}</span></div>
          <div class="col-body">${colTasks.length === 0 ? '<div class="empty-hint">Vide</div>' : colTasks.map(renderCard).join('')}</div></div>`;
      }).join('')}
    </div>`;
  }

  function renderSprintsTab() {
    const sorted = [...sprints].sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
    return `<div class="toolbar"><div></div><button class="btn-add" id="btn-open-sprint-add">+ Nouveau sprint</button></div>
    ${sorted.length === 0 ? '<div class="empty-hint" style="padding:30px">Aucun sprint créé</div>' : sorted.map(s => {
      const sTasks = tasks.filter(t => t.sprint_id === s.id);
      const done = sTasks.filter(t => t.status === 'done').length;
      const pct = sTasks.length ? Math.round((done / sTasks.length) * 100) : 0;
      return `<div class="sprint-card">
        <div class="sprint-card-head">
          <div class="sprint-name">${escapeHtml(s.name)} <span class="sprint-status ${s.status}">${s.status === 'planned' ? 'Planifié' : s.status === 'active' ? 'Actif' : 'Terminé'}</span></div>
          <div class="sprint-actions"><button class="icon-btn edit-sprint-btn" data-id="${s.id}" title="Modifier">✎</button><button class="icon-btn danger del-sprint-btn" data-id="${s.id}" title="Supprimer">✕</button></div>
        </div>
        <div class="sprint-dates">${s.start_date ? fmtDate(s.start_date) : '?'} → ${s.end_date ? fmtDate(s.end_date) : '?'}</div>
        ${s.goal ? `<div class="sprint-goal">${escapeHtml(s.goal)}</div>` : ''}
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div class="sprint-stats"><span>${done}/${sTasks.length} tâches terminées (${pct}%)</span><span>Bloquées: ${sTasks.filter(t => t.status === 'blocked').length}</span></div>
      </div>`;
    }).join('')}`;
  }

  function bar(label, value, max, color) {
    const pct = max > 0 ? Math.round((value / max) * 100) : 0;
    return `<div class="bar-row"><span class="bar-label">${label}</span><div class="bar-track"><div class="bar-fill" style="width:${pct}%; background:${color}"></div></div><span class="bar-val">${value}</span></div>`;
  }

  function renderReportsTab() {
    const total = tasks.length;
    const done = tasks.filter(t => t.status === 'done').length;
    const blocked = tasks.filter(t => t.status === 'blocked').length;
    const rate = total ? Math.round((done / total) * 100) : 0;
    const maxTeam = Math.max(1, ...Object.keys(TEAMS).map(k => tasks.filter(t => t.team === k).length));
    const maxPrio = Math.max(1, ...Object.keys(PRIORITIES).map(k => tasks.filter(t => t.priority === k).length));
    const completedSprints = sprints.filter(s => s.status !== 'planned');
    const maxVelocity = Math.max(1, ...completedSprints.map(s => tasks.filter(t => t.sprint_id === s.id && t.status === 'done').length));

    return `<div class="report-grid">
      <div class="report-stat"><div class="val">${total}</div><div class="lbl">Total tâches</div></div>
      <div class="report-stat"><div class="val" style="color:var(--s-done)">${done}</div><div class="lbl">Terminées</div></div>
      <div class="report-stat"><div class="val" style="color:var(--s-blocked)">${blocked}</div><div class="lbl">Bloquées</div></div>
      <div class="report-stat"><div class="val" style="color:var(--accent)">${rate}%</div><div class="lbl">Taux de complétion</div></div>
    </div>
    <div class="report-grid-2">
      <div class="chart-panel"><h4>Charge par équipe</h4>${Object.entries(TEAMS).map(([k, v]) => bar(v.label, tasks.filter(t => t.team === k).length, maxTeam, v.color)).join('')}</div>
      <div class="chart-panel"><h4>Répartition par priorité</h4>${Object.entries(PRIORITIES).map(([k, v]) => bar(v.label, tasks.filter(t => t.priority === k).length, maxPrio, v.color)).join('')}</div>
    </div>
    ${completedSprints.length ? `<div class="chart-panel"><h4>Vélocité par sprint (tâches terminées)</h4>${completedSprints.map(s => bar(s.name.slice(0, 12), tasks.filter(t => t.sprint_id === s.id && t.status === 'done').length, maxVelocity, 'var(--accent)')).join('')}</div>` : ''}
    <div class="chart-panel"><h4>Activité récente</h4><div class="activity-feed" id="activity-feed"><div class="history-empty">Chargement…</div></div></div>`;
  }

  function renderTaskModal() {
    if (!modalState) return '';
    const isEdit = modalState.mode === 'edit';
    const t = isEdit ? modalState.task : { title: '', desc: '', team: 'dev', priority: 'medium', assignee: '', due: '', sprint_id: '' };
    const sprintOptions = sprints.map(s => `<option value="${s.id}" ${t.sprint_id === s.id ? 'selected' : ''}>${escapeHtml(s.name)}</option>`).join('');
    return `<div class="overlay" id="modal-overlay"><div class="modal">
      <h3>${isEdit ? 'Modifier la tâche' : 'Nouvelle tâche'}</h3>
      <div class="field"><label>Titre</label><input type="text" id="f-title" value="${escapeHtml(t.title)}" placeholder="Ex: Renouveler le certificat kubelet" /></div>
      <div class="field"><label>Description</label><textarea id="f-desc" placeholder="Détails, contexte...">${escapeHtml(t.desc)}</textarea></div>
      <div class="field-row">
        <div class="field"><label>Équipe</label><select id="f-team">${Object.entries(TEAMS).map(([k, v]) => `<option value="${k}" ${t.team === k ? 'selected' : ''}>${v.label}</option>`).join('')}</select></div>
        <div class="field"><label>Priorité</label><select id="f-priority">${Object.entries(PRIORITIES).map(([k, v]) => `<option value="${k}" ${t.priority === k ? 'selected' : ''}>${v.label}</option>`).join('')}</select></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Assigné à</label><input type="text" id="f-assignee" value="${escapeHtml(t.assignee)}" placeholder="Nom" /></div>
        <div class="field"><label>Échéance</label><input type="date" id="f-due" value="${t.due || ''}" /></div>
      </div>
      <div class="field"><label>Sprint</label><select id="f-sprint"><option value="">— Backlog —</option>${sprintOptions}</select></div>
      ${isEdit ? `<div class="history-block"><h4>Historique</h4><div id="history-list"><div class="history-empty">Chargement…</div></div></div>` : ''}
      <div class="modal-actions"><button class="btn-secondary" id="btn-cancel">Annuler</button><button class="btn-add" id="btn-save">${isEdit ? 'Enregistrer' : 'Créer'}</button></div>
    </div></div>`;
  }

  function renderSprintModal() {
    if (!sprintModalState) return '';
    const isEdit = sprintModalState.mode === 'edit';
    const s = isEdit ? sprintModalState.sprint : { name: '', goal: '', start_date: '', end_date: '', status: 'planned' };
    return `<div class="overlay" id="sprint-modal-overlay"><div class="modal">
      <h3>${isEdit ? 'Modifier le sprint' : 'Nouveau sprint'}</h3>
      <div class="field"><label>Nom</label><input type="text" id="sf-name" value="${escapeHtml(s.name)}" placeholder="Ex: Sprint 28 - Juillet" /></div>
      <div class="field"><label>Objectif</label><textarea id="sf-goal" placeholder="But du sprint...">${escapeHtml(s.goal)}</textarea></div>
      <div class="field-row">
        <div class="field"><label>Début</label><input type="date" id="sf-start" value="${s.start_date || ''}" /></div>
        <div class="field"><label>Fin</label><input type="date" id="sf-end" value="${s.end_date || ''}" /></div>
      </div>
      <div class="field"><label>Statut</label><select id="sf-status">
        <option value="planned" ${s.status === 'planned' ? 'selected' : ''}>Planifié</option>
        <option value="active" ${s.status === 'active' ? 'selected' : ''}>Actif</option>
        <option value="completed" ${s.status === 'completed' ? 'selected' : ''}>Terminé</option>
      </select></div>
      <div class="modal-actions"><button class="btn-secondary" id="btn-sprint-cancel">Annuler</button><button class="btn-add" id="btn-sprint-save">${isEdit ? 'Enregistrer' : 'Créer'}</button></div>
    </div></div>`;
  }

  function render() {
    root.innerHTML = `
      <div class="ob-header"><div>
        <div class="ob-title"><span class="dot"></span>Ops Board — Dev / DevOps / Test</div>
        <div class="ob-sub">${connError ? '⚠ connexion impossible, vérifie la configuration' : saveError ? '⚠ dernière action non synchronisée' : 'board partagé · synchronisé en temps réel'}</div>
      </div></div>
      ${renderNavTabs()}
      ${activeTab === 'board' ? renderBoardTab() : ''}
      ${activeTab === 'sprints' ? renderSprintsTab() : ''}
      ${activeTab === 'reports' ? renderReportsTab() : ''}
      ${renderTaskModal()}
      ${renderSprintModal()}
    `;
    attachEvents();
    if (activeTab === 'reports') loadAndRenderActivity();
    if (modalState && modalState.mode === 'edit') loadAndRenderHistory(modalState.task.id);
  }

  async function loadAndRenderActivity() {
    const items = await loadRecentActivity();
    const el = document.getElementById('activity-feed');
    if (!el) return;
    if (!items.length) { el.innerHTML = '<div class="history-empty">Aucune activité</div>'; return; }
    el.innerHTML = items.map(h => `<div class="activity-item"><span class="activity-time">${fmtDateTime(h.changed_at)}</span><span>${describeHistory(h)}</span></div>`).join('');
  }

  async function loadAndRenderHistory(taskId) {
    const items = await loadHistoryForTask(taskId);
    const el = document.getElementById('history-list');
    if (!el) return;
    if (!items.length) { el.innerHTML = '<div class="history-empty">Aucun historique</div>'; return; }
    el.innerHTML = items.map(h => `<div class="history-item"><span class="h-dot"></span><span>${fmtDateTime(h.changed_at)} — ${describeHistory(h)}</span></div>`).join('');
  }

  function describeHistory(h) {
    const title = h.task_title ? `<b>${escapeHtml(h.task_title)}</b> — ` : '';
    if (h.field === 'created') return `${title}créée`;
    if (h.field === 'status') return `${title}${statusLabel(h.old_value)} → ${statusLabel(h.new_value)}`;
    if (h.field === 'sprint') {
      const oldS = sprints.find(s => s.id === h.old_value)?.name || 'Backlog';
      const newS = sprints.find(s => s.id === h.new_value)?.name || 'Backlog';
      return `${title}déplacée vers ${escapeHtml(newS)} (depuis ${escapeHtml(oldS)})`;
    }
    return `${title}${h.field} modifié`;
  }

  function attachEvents() {
    root.querySelectorAll('[data-tab]').forEach(el => el.addEventListener('click', () => { activeTab = el.getAttribute('data-tab'); render(); }));
    root.querySelectorAll('[data-filter]').forEach(el => el.addEventListener('click', () => { activeTeamFilter = el.getAttribute('data-filter'); render(); }));

    const sprintFilter = document.getElementById('sprint-filter');
    if (sprintFilter) sprintFilter.addEventListener('change', (e) => { activeSprintFilter = e.target.value; render(); });

    const openAdd = document.getElementById('btn-open-add');
    if (openAdd) openAdd.addEventListener('click', () => { modalState = { mode: 'add' }; render(); });

    root.querySelectorAll('.edit-btn').forEach(btn => btn.addEventListener('click', (e) => {
      const id = e.target.closest('.card').getAttribute('data-id');
      modalState = { mode: 'edit', task: tasks.find(t => t.id === id) }; render();
    }));
    root.querySelectorAll('[data-open-detail]').forEach(el => el.addEventListener('click', () => {
      const id = el.getAttribute('data-open-detail');
      modalState = { mode: 'edit', task: tasks.find(t => t.id === id) }; render();
    }));
    root.querySelectorAll('.del-btn').forEach(btn => btn.addEventListener('click', (e) => deleteTask(e.target.closest('.card').getAttribute('data-id'))));
    root.querySelectorAll('.move-left').forEach(btn => btn.addEventListener('click', (e) => moveTask(e.target.closest('.card').getAttribute('data-id'), -1)));
    root.querySelectorAll('.move-right').forEach(btn => btn.addEventListener('click', (e) => moveTask(e.target.closest('.card').getAttribute('data-id'), 1)));

    const cancelBtn = document.getElementById('btn-cancel');
    if (cancelBtn) cancelBtn.addEventListener('click', () => { modalState = null; render(); });
    const overlay = document.getElementById('modal-overlay');
    if (overlay) overlay.addEventListener('click', (e) => { if (e.target === overlay) { modalState = null; render(); } });

    const saveBtn = document.getElementById('btn-save');
    if (saveBtn) saveBtn.addEventListener('click', () => {
      const title = document.getElementById('f-title').value.trim();
      if (!title) { document.getElementById('f-title').focus(); return; }
      const data = {
        title, desc: document.getElementById('f-desc').value.trim(),
        team: document.getElementById('f-team').value, priority: document.getElementById('f-priority').value,
        assignee: document.getElementById('f-assignee').value.trim(), due: document.getElementById('f-due').value,
        sprint_id: document.getElementById('f-sprint').value || null
      };
      if (modalState.mode === 'edit') updateTask(modalState.task.id, data); else addTask(data);
      modalState = null; render();
    });

    const openSprintAdd = document.getElementById('btn-open-sprint-add');
    if (openSprintAdd) openSprintAdd.addEventListener('click', () => { sprintModalState = { mode: 'add' }; render(); });
    root.querySelectorAll('.edit-sprint-btn').forEach(btn => btn.addEventListener('click', (e) => {
      const id = e.target.getAttribute('data-id');
      sprintModalState = { mode: 'edit', sprint: sprints.find(s => s.id === id) }; render();
    }));
    root.querySelectorAll('.del-sprint-btn').forEach(btn => btn.addEventListener('click', (e) => deleteSprint(e.target.getAttribute('data-id'))));

    const sprintCancelBtn = document.getElementById('btn-sprint-cancel');
    if (sprintCancelBtn) sprintCancelBtn.addEventListener('click', () => { sprintModalState = null; render(); });
    const sprintOverlay = document.getElementById('sprint-modal-overlay');
    if (sprintOverlay) sprintOverlay.addEventListener('click', (e) => { if (e.target === sprintOverlay) { sprintModalState = null; render(); } });

    const sprintSaveBtn = document.getElementById('btn-sprint-save');
    if (sprintSaveBtn) sprintSaveBtn.addEventListener('click', () => {
      const name = document.getElementById('sf-name').value.trim();
      if (!name) { document.getElementById('sf-name').focus(); return; }
      const data = {
        name, goal: document.getElementById('sf-goal').value.trim(),
        start_date: document.getElementById('sf-start').value || null,
        end_date: document.getElementById('sf-end').value || null,
        status: document.getElementById('sf-status').value
      };
      saveSprint(data, sprintModalState.mode === 'edit' ? sprintModalState.sprint.id : null);
      sprintModalState = null; render();
    });
  }

  supabase.channel('tasks-changes').on('postgres_changes', { event: '*', schema: 'public', table: 'tasks' }, () => loadAll()).subscribe();
  supabase.channel('sprints-changes').on('postgres_changes', { event: '*', schema: 'public', table: 'sprints' }, () => loadAll()).subscribe();

  loadAll();
})();
</script>
</body>
</html>
